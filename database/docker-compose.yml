version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wtld_postgres
    environment:
      POSTGRES_DB: wtld_db
      POSTGRES_USER: wtld_user
      POSTGRES_PASSWORD: wtld_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wtld_user -d wtld_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: